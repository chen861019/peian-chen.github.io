baseurl = "https://chen861019.github.io/peian-chen/"
languageCode = "zh-tw"
theme = "terminal"
pagination.pagerSize = 5
defaultContentLanguage = "zh-tw"

[markup.goldmark.renderer]
  unsafe = true

[params]
  customCSS = ["css/custom.css"]
  contentTypeName = "posts"
  showMenuItems = 5
  fullWidthTheme = false
  centerTheme = false
  favicon = "favicon.ico"
  showReadMore = false
  displayReadMore = false

[sitemaps]
  disable = true

[languages]
  [languages.zh-tw]
    title = "peian's Portfolio"
    subtitle = ""
    keywords = ""
    copyright = "© 2026 peian"
    menuMore = "顯示更多"
    readMore = "閱讀全文"
    readOtherPosts = "閱讀其他文章"

    [languages.zh-tw.params.logo]
      logoText = " peian "
      logoHomeLink = "/"

    [languages.zh-tw.menu]
      [[languages.zh-tw.menu.main]]
        identifier = "about"
        name = "關於我"
        url = "/#about"
        weight = 1
      [[languages.zh-tw.menu.main]]
        identifier = "skill"
        name = "技能"
        url = "/#skill"
        weight = 2
      [[languages.zh-tw.menu.main]]
        identifier = "experience"
        name = "經歷"
        url = "/#experience"
        weight = 3
      [[languages.zh-tw.menu.main]]
        identifier = "research"
