<script>
document.addEventListener('DOMContentLoaded', function() {
    const parts = document.querySelectorAll('.exp-part');
    
    parts.forEach(part => {
        const dot = part.querySelector('.exp-dot');
        const card = part.querySelector('.first-card');
        if (!dot || !card) return;

        let targetY = 0;
        let currentY = 0;
        let isHovering = false;
        let animationFrameId = null;

        function animate() {
            const diff = targetY - currentY;
            
            
            
            const dynamicSpeed = isHovering ? 0.15 : 0.02; 
            
            currentY += diff * dynamicSpeed;

            
            dot.style.top = `${currentY}px`;
            card.style.setProperty('--line-height', `${currentY}px`);

            
            if (!isHovering && Math.abs(currentY) < 0.1) {
                currentY = 0;
                targetY = 0;
                card.style.setProperty('--line-height', '0px');
                dot.style.top = '0px';
                animationFrameId = null;
                return;
            }

            animationFrameId = requestAnimationFrame(animate);
        }

        part.addEventListener('mousemove', (e) => {
            const rect = part.getBoundingClientRect();
            let mouseY = e.clientY - rect.top;

            
            const currentLimit = rect.height - 12; 
            targetY = Math.max(0, Math.min(mouseY, currentLimit));

            dot.style.opacity = '1';

            if (!isHovering) {
                isHovering = true;
                if (!animationFrameId) {
                    animationFrameId = requestAnimationFrame(animate);
                }
            }
        });

        part.addEventListener('mouseleave', () => {
            isHovering = false;
            targetY = 0; 
            dot.style.opacity = '0';
        });
    });
});

const boxes = document.querySelectorAll('.research-section li');

boxes.forEach(box => {
  box.addEventListener('mouseenter', () => {
    box.classList.add('is-active');
  }, { once: true }); 
});

</script>
